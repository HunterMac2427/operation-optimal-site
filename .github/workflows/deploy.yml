name: Deploy to Cloudways

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_HOST: 157.245.15.106
          SSH_USER: master_jfxmdatmhr
          SSH_PASS: ${{ secrets.CW_SSH_PASS }}
          DEPLOY_DIR: /home/master/applications/ykyuhnjqzv/public_html/wp-content/themes/operation-optimal
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1

          # Ensure theme directory exists
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "mkdir -p $DEPLOY_DIR"

          # Sync theme files (exclude git/github/dev/mockup files)
          # Exit code 23 = partial transfer (timestamp permission errors) — files are fine
          sshpass -p "$SSH_PASS" rsync -rlvz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='CLAUDE.md' \
            --exclude='docs' \
            --exclude='social-posts' \
            --exclude='book in hand photos' \
            --exclude='book in hand photos.zip' \
            --exclude='build_social*.py' \
            --exclude='instagram-carousels.html' \
            --exclude='review-followup-email.html' \
            --exclude='review-insert-card.html' \
            --exclude='Operation Optimal' \
            --exclude='Operation Optimal Cover Design.jpg' \
            --exclude='Purchase Link' \
            --exclude='paperback-barcode.jpg' \
            --exclude='operation-optimal-preorders.csv' \
            --exclude='js' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_DIR/" || [ $? -eq 23 ]

      - name: Purge Varnish
        run: |
          TOKEN=$(curl -s -X POST "https://api.cloudways.com/api/v1/oauth/access_token" \
            -d "email=${{ secrets.CW_EMAIL }}" \
            -d "api_key=${{ secrets.CW_API_KEY }}" | jq -r '.access_token')

          curl -s -X POST "https://api.cloudways.com/api/v1/service/varnish" \
            -H "Authorization: Bearer $TOKEN" \
            -d "server_id=${{ secrets.CW_SERVER_ID }}" \
            -d "action=purge"
